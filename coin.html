<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>МОНЕТОБОЙНЯ — Орёл vs Решка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1A0033, #0A0A2A);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .player-card {
            background: rgba(0,0,0,0.7);
            border: 3px solid;
            padding: 8px 20px;
            text-align: center;
            box-shadow: 0 0 20px;
            backdrop-filter: blur(4px);
            border-radius: 30px;
        }

        .player-card.left {
            border-color: #FF00FF;
            box-shadow: 0 0 20px #FF00FF;
        }

        .player-card.right {
            border-color: #00FFFF;
            box-shadow: 0 0 20px #00FFFF;
        }

        .player-name {
            font-size: 14px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #FFFFFF;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .player-side {
            font-size: 8px;
            color: #FF69B4;
        }

        .timer-box {
            background: #0e0e2a;
            border: 2px solid #FFFF00;
            padding: 8px 20px;
            text-align: center;
            box-shadow: 0 0 20px #FFFF00;
            border-radius: 30px;
        }

        .timer-value {
            font-size: 28px;
            color: #FFFF00;
            text-shadow: 0 0 8px #FFFF00;
        }

        .coin-area {
            text-align: center;
            position: relative;
            margin-top: 80px;
            cursor: pointer;
        }

        .coin {
            font-size: 160px;
            display: inline-block;
            transition: all 0.05s linear;
            filter: drop-shadow(0 0 25px gold);
            cursor: pointer;
        }

        .coin-clickable {
            cursor: pointer;
            transition: transform 0.1s;
        }

        .coin-clickable:active {
            transform: scale(0.95);
        }

        .coin-shake-small {
            animation: shakeSmall 0.1s ease-in-out 0s infinite;
        }

        .coin-shake-medium {
            animation: shakeMedium 0.08s ease-in-out 0s infinite;
        }

        .coin-shake-large {
            animation: shakeLarge 0.05s ease-in-out 0s infinite;
        }

        @keyframes shakeSmall {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, -2px) rotate(-5deg); }
            75% { transform: translate(3px, 2px) rotate(5deg); }
        }

        @keyframes shakeMedium {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-6px, -4px) rotate(-10deg); }
            75% { transform: translate(6px, 4px) rotate(10deg); }
        }

        @keyframes shakeLarge {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-10px, -6px) rotate(-15deg); }
            75% { transform: translate(10px, 6px) rotate(15deg); }
        }

        .coin-fly-up {
            animation: flyUp 0.3s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-80px) rotate(360deg); }
        }

        .coin-fly-down {
            animation: flyDown 0.3s ease-in forwards;
        }

        @keyframes flyDown {
            0% { transform: translateY(-80px) rotate(360deg); }
            100% { transform: translateY(0) rotate(720deg); }
        }

        .coin-side-text {
            margin-top: 20px;
            font-size: 14px;
            color: #FF69B4;
            text-shadow: 0 0 5px #FF69B4;
            min-height: 50px;
        }

        .abilities-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            gap: 15px;
            z-index: 10;
        }

        .ability-group {
            background: rgba(14,14,42,0.95);
            border: 2px solid #FF00FF;
            padding: 14px 20px;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 0 15px #FF00FF;
            backdrop-filter: blur(4px);
            border-radius: 20px;
        }

        .ability-group.left {
            border-color: #FF00FF;
        }

        .ability-group.right {
            border-color: #00FFFF;
        }

        .ability-title {
            font-size: 11px;
            color: #FFFF00;
            margin-bottom: 8px;
        }

        .ability-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ability-btn {
            background: #0A0A2A;
            border: 1px solid;
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: 0.05s linear;
            min-width: 80px;
            border-radius: 15px;
        }

        .ability-btn.left {
            border-color: #FF00FF;
            box-shadow: 0 0 5px #FF00FF;
        }

        .ability-btn.right {
            border-color: #00FFFF;
            box-shadow: 0 0 5px #00FFFF;
        }

        .ability-btn:active {
            transform: scale(0.95);
        }

        .ability-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .cooldown-text {
            font-size: 8px;
            color: #FF69B4;
            margin-top: 6px;
        }

        .effect-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 45px;
            animation: flyAway 0.6s ease-out forwards;
        }

        @keyframes flyAway {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx, 100px), var(--ty, -100px)) scale(1.5); opacity: 0; }
        }

        .explosion-effect {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            font-size: 70px;
            animation: explode 0.4s ease-out forwards;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .block-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #FF00FF;
            text-shadow: 0 0 20px #FF00FF;
            animation: blockFlash 0.6s ease-out;
            pointer-events: none;
            flex-direction: column;
            gap: 10px;
        }

        @keyframes blockFlash {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .result-text {
            font-size: 40px;
            color: #FFFF00;
            text-shadow: 0 0 20px #FF00FF;
            animation: pulse 0.8s infinite;
        }

        .result-close {
            margin-top: 40px;
            background: #FF00FF;
            border: none;
            padding: 12px 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 40px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status-text {
            position: absolute;
            top: 160px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #00FFFF;
            text-shadow: 0 0 5px #00FFFF;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 20px;
        }

        .touch-hint {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 8px;
            color: #FF69B4;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            margin: 0 20px;
            border-radius: 15px;
            z-index: 15;
        }

        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .tutorial-card {
            background: #0e0e2a;
            border: 3px solid #FF00FF;
            border-radius: 30px;
            padding: 25px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px #FF00FF;
            animation: cardAppear 0.3s ease-out;
        }

        @keyframes cardAppear {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tutorial-title {
            font-size: 16px;
            color: #FFFF00;
            margin-bottom: 15px;
        }

        .tutorial-content {
            font-size: 9px;
            color: #00FFFF;
            line-height: 1.8;
            text-align: left;
            margin: 10px 0;
        }

        .tutorial-demo {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .tutorial-key {
            background: #0A0A2A;
            border: 2px solid;
            border-radius: 12px;
            padding: 6px 10px;
            text-align: center;
            min-width: 65px;
        }

        .tutorial-key.up { border-color: #00FF00; }
        .tutorial-key.down { border-color: #FF0000; }
        .tutorial-key-letter { font-size: 16px; color: white; }
        .tutorial-key-label { font-size: 7px; margin-top: 3px; }

        .tutorial-next {
            background: #FF00FF;
            border: none;
            padding: 10px 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            border-radius: 30px;
            margin-top: 10px;
        }

        @media (max-width: 700px) {
            .coin { font-size: 120px; }
            .player-card { padding: 5px 12px; }
            .player-name { font-size: 10px; }
            .timer-value { font-size: 20px; }
            .ability-group { padding: 10px 15px; min-width: 220px; }
            .ability-btn { font-size: 8px; padding: 8px 10px; min-width: 65px; }
            .ability-title { font-size: 9px; }
            .result-text { font-size: 28px; }
            .status-text { top: 140px; font-size: 8px; }
            .touch-hint { bottom: 100px; font-size: 7px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="player-card left">
            <div class="player-name" id="playerAName">🦅 ИГРОК A</div>
            <div class="player-side">СТАВИТ НА ОРЛА</div>
        </div>
        <div class="timer-box">
            <div class="timer-value" id="timerValue">30</div>
        </div>
        <div class="player-card right">
            <div class="player-name" id="playerBName">🪨 ИГРОК B</div>
            <div class="player-side">СТАВИТ НА РЕШКУ</div>
        </div>
    </div>

    <div class="status-text" id="statusText">⚡ НАЖМИТЕ НА МОНЕТКУ, ЧТОБЫ БРОСИТЬ! ⚡</div>

    <div class="coin-area">
        <div class="coin coin-clickable" id="coin">🪙</div>
        <div class="coin-side-text" id="coinSideText">🪙 МОНЕТКА ЖДЁТ БРОСКА</div>
    </div>

    <div class="abilities-panel">
        <div class="ability-group left">
            <div class="ability-title">🔥 <span id="playerAShort">ИГРОК A</span> (Q/W/E)</div>
            <div class="ability-buttons">
                <button class="ability-btn left" id="skillA1">🍅 ПОМИДОР</button>
                <button class="ability-btn left" id="skillA2">🔄 ПЕРЕВОРОТ</button>
                <button class="ability-btn left" id="skillA3">💥 ВЗРЫВ</button>
            </div>
            <div class="cooldown-text" id="cooldownA">✅ ВСЕ ГОТОВЫ</div>
        </div>
        <div class="ability-group right">
            <div class="ability-title">🔥 <span id="playerBShort">ИГРОК B</span> (U/I/O)</div>
            <div class="ability-buttons">
                <button class="ability-btn right" id="skillB1">🍅 ПОМИДОР</button>
                <button class="ability-btn right" id="skillB2">🔄 ПЕРЕВОРОТ</button>
                <button class="ability-btn right" id="skillB3">💥 ВЗРЫВ</button>
            </div>
            <div class="cooldown-text" id="cooldownB">✅ ВСЕ ГОТОВЫ</div>
        </div>
    </div>

    <div class="touch-hint" id="touchHint">👇 ТАПНИ ПО ЭКРАНУ ДЛЯ СПОСОБНОСТЕЙ 👆</div>
</div>

<script>
    // ==================== ПОЛУЧАЕМ ДАННЫЕ ИГРОКОВ ИЗ URL ====================
    const urlParams = new URLSearchParams(window.location.search);
    let playerAName = urlParams.get('p1') || 'ИГРОК A';
    let playerAAvatar = urlParams.get('p1avatar') || '🦅';
    let playerBName = urlParams.get('p2') || 'ИГРОК B';
    let playerBAvatar = urlParams.get('p2avatar') || '🪨';
    let userQuestion = urlParams.get('question') || 'КТО ПОБЕДИТ?';
    let tutorialShown = false;

    document.getElementById('playerAName').innerHTML = `${playerAAvatar} ${playerAName}`;
    document.getElementById('playerBName').innerHTML = `${playerBAvatar} ${playerBName}`;
    document.getElementById('playerAShort').innerHTML = playerAName;
    document.getElementById('playerBShort').innerHTML = playerBName;

    // ========== ИГРОВОЕ СОСТОЯНИЕ ==========
    let gameActive = false;
    let coinSide = null;
    let timeLeft = 30;
    let timerInterval = null;
    let roundResult = null;
    let isFalling = false;
    let isAnimating = false;
    
    let cooldowns = {
        A: { tomato: 0, flip: 0, bomb: 0 },
        B: { tomato: 0, flip: 0, bomb: 0 }
    };
    
    let blocked = { A: false, B: false };
    let blockTimers = { A: null, B: null };
    
    function createEffect(emoji, x, y, tx, ty) {
        const effect = document.createElement('div');
        effect.className = 'effect-overlay';
        effect.textContent = emoji;
        effect.style.left = x + 'px';
        effect.style.top = y + 'px';
        effect.style.position = 'fixed';
        effect.style.setProperty('--tx', tx + 'px');
        effect.style.setProperty('--ty', ty + 'px');
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 600);
    }
    
    function showExplosion() {
        const explosion = document.createElement('div');
        explosion.className = 'explosion-effect';
        explosion.innerHTML = '💥💣💥';
        document.body.appendChild(explosion);
        setTimeout(() => explosion.remove(), 400);
    }
    
    function showBlockEffect(player, reason) {
        const effect = document.createElement('div');
        effect.className = 'block-effect';
        effect.innerHTML = `🔒 ${player === 'A' ? playerAName : playerBName} ${reason} 🔒`;
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 800);
    }
    
    function animateCoinFlip(callback) {
        const coin = document.getElementById('coin');
        const coinSideText = document.getElementById('coinSideText');
        
        isAnimating = true;
        
        coin.classList.add('coin-shake-small');
        coinSideText.innerHTML = '🪙 МОНЕТКА ТРЯСЁТСЯ... 🪙';
        
        setTimeout(() => {
            coin.classList.remove('coin-shake-small');
            coin.classList.add('coin-shake-medium');
            coinSideText.innerHTML = '⚡ МОНЕТКА НАПРЯГАЕТСЯ! ⚡';
            
            setTimeout(() => {
                coin.classList.remove('coin-shake-medium');
                coin.classList.add('coin-shake-large');
                coinSideText.innerHTML = '💥 СЕЙЧАС ПЕРЕВЕРНЁТСЯ! 💥';
                
                setTimeout(() => {
                    coin.classList.remove('coin-shake-large');
                    coin.classList.add('coin-fly-up');
                    
                    setTimeout(() => {
                        coin.textContent = '❓';
                        coinSideText.innerHTML = '🤔 МОНЕТКА В ВОЗДУХЕ... 🤔';
                        
                        setTimeout(() => {
                            coin.classList.remove('coin-fly-up');
                            coin.classList.add('coin-fly-down');
                            
                            setTimeout(() => {
                                coin.classList.remove('coin-fly-down');
                                isAnimating = false;
                                callback();
                            }, 280);
                        }, 150);
                    }, 280);
                }, 400);
            }, 300);
        }, 300);
    }
    
    function updateCooldownUI() {
        const cooldownADiv = document.getElementById('cooldownA');
        const cooldownBDiv = document.getElementById('cooldownB');
        
        const aReady = cooldowns.A.tomato <= 0 && cooldowns.A.flip <= 0 && cooldowns.A.bomb <= 0;
        const bReady = cooldowns.B.tomato <= 0 && cooldowns.B.flip <= 0 && cooldowns.B.bomb <= 0;
        
        if (aReady) cooldownADiv.innerHTML = '✅ ВСЕ ГОТОВЫ';
        else {
            let maxCd = Math.max(cooldowns.A.tomato, cooldowns.A.flip, cooldowns.A.bomb);
            cooldownADiv.innerHTML = `⏱️ ${maxCd} сек`;
        }
        
        if (bReady) cooldownBDiv.innerHTML = '✅ ВСЕ ГОТОВЫ';
        else {
            let maxCd = Math.max(cooldowns.B.tomato, cooldowns.B.flip, cooldowns.B.bomb);
            cooldownBDiv.innerHTML = `⏱️ ${maxCd} сек`;
        }
        
        const btns = {
            A: ['skillA1', 'skillA2', 'skillA3'],
            B: ['skillB1', 'skillB2', 'skillB3']
        };
        const skillsA = [cooldowns.A.tomato, cooldowns.A.flip, cooldowns.A.bomb];
        const skillsB = [cooldowns.B.tomato, cooldowns.B.flip, cooldowns.B.bomb];
        
        btns.A.forEach((id, idx) => {
            const btn = document.getElementById(id);
            if (btn) {
                if (skillsA[idx] > 0 || blocked.A || !gameActive || isFalling || roundResult || isAnimating) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            }
        });
        
        btns.B.forEach((id, idx) => {
            const btn = document.getElementById(id);
            if (btn) {
                if (skillsB[idx] > 0 || blocked.B || !gameActive || isFalling || roundResult || isAnimating) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            }
        });
    }
    
    function startCooldownTimers() {
        setInterval(() => {
            let changed = false;
            for (let p of ['A', 'B']) {
                for (let skill of ['tomato', 'flip', 'bomb']) {
                    if (cooldowns[p][skill] > 0) {
                        cooldowns[p][skill]--;
                        changed = true;
                    }
                }
            }
            if (changed) updateCooldownUI();
        }, 1000);
    }
    
    function flipCoinTo(player) {
        if (!gameActive || isFalling || roundResult || isAnimating) return false;
        
        const targetSide = player === 'A' ? 'heads' : 'tails';
        if (coinSide === targetSide) {
            const status = document.getElementById('statusText');
            status.innerHTML = `😤 МОНЕТКА УЖЕ НА СТОРОНЕ ${player === 'A' ? playerAName : playerBName}!`;
            setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 1500);
            return false;
        }
        
        animateCoinFlip(() => {
            coinSide = targetSide;
            const coin = document.getElementById('coin');
            const coinSideText = document.getElementById('coinSideText');
            
            if (coinSide === 'heads') {
                coin.textContent = '🦅';
                coinSideText.innerHTML = `🦅 ${playerAName} ПЕРЕВЕРНУЛ МОНЕТКУ! ТЕПЕРЬ ОРЁЛ! 🦅`;
            } else {
                coin.textContent = '🪨';
                coinSideText.innerHTML = `🪨 ${playerBName} ПЕРЕВЕРНУЛ МОНЕТКУ! ТЕПЕРЬ РЕШКА! 🪨`;
            }
            
            const status = document.getElementById('statusText');
            status.innerHTML = `🔄 ${player === 'A' ? playerAName : playerBName} ПЕРЕВЕРНУЛ МОНЕТКУ НА СВОЮ СТОРОНУ! 🔄`;
            setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 2000);
        });
        
        return true;
    }
    
    function randomExplosion(player) {
        if (!gameActive || isFalling || roundResult || isAnimating) return false;
        
        showExplosion();
        
        animateCoinFlip(() => {
            const newSide = Math.random() < 0.5 ? 'heads' : 'tails';
            coinSide = newSide;
            const coin = document.getElementById('coin');
            const coinSideText = document.getElementById('coinSideText');
            
            if (coinSide === 'heads') {
                coin.textContent = '🦅';
                coinSideText.innerHTML = `💥 ВЗРЫВ! МОНЕТКА ПЕРЕВЕРНУЛАСЬ НА ОРЛА! 💥`;
            } else {
                coin.textContent = '🪨';
                coinSideText.innerHTML = `💥 ВЗРЫВ! МОНЕТКА ПЕРЕВЕРНУЛАСЬ НА РЕШКУ! 💥`;
            }
            
            const status = document.getElementById('statusText');
            status.innerHTML = `💥 ${player === 'A' ? playerAName : playerBName} УСТРОИЛ ВЗРЫВ! МОНЕТКА ПЕРЕВЕРНУЛАСЬ! 💥`;
            setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 2000);
        });
        
        return true;
    }
    
    function useAbility(player, skill) {
        if (!gameActive || isFalling || roundResult || isAnimating) return;
        if (blocked[player]) {
            const status = document.getElementById('statusText');
            status.innerHTML = `🔒 ИГРОК ${player === 'A' ? playerAName : playerBName} ЗАБЛОКИРОВАН! 🔒`;
            setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 1500);
            return;
        }
        
        let cd = 0;
        let emoji = '';
        let effectMsg = '';
        let action = null;
        
        switch(skill) {
            case 'tomato':
                cd = 6;
                emoji = '🍅';
                effectMsg = `🍅 ${player === 'A' ? playerAName : playerBName} КИНУЛ ПОМИДОР! КНОПКИ СОПЕРНИКА ЗАБЛОКИРОВАНЫ НА 3 СЕК! 🍅`;
                action = () => {
                    const opponent = player === 'A' ? 'B' : 'A';
                    if (blockTimers[opponent]) clearTimeout(blockTimers[opponent]);
                    blocked[opponent] = true;
                    showBlockEffect(opponent, 'ЗАБЛОКИРОВАН ПОМИДОРОМ!');
                    blockTimers[opponent] = setTimeout(() => {
                        blocked[opponent] = false;
                        updateCooldownUI();
                        const status = document.getElementById('statusText');
                        status.innerHTML = `🍅 БЛОКИРОВКА ${opponent === 'A' ? playerAName : playerBName} ЗАКОНЧИЛАСЬ! 🍅`;
                        setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 1500);
                    }, 3000);
                    updateCooldownUI();
                };
                break;
            case 'flip':
                cd = 9;
                emoji = '🔄';
                effectMsg = `🔄 ${player === 'A' ? playerAName : playerBName} ПЕРЕВЕРНУЛ МОНЕТКУ НА СВОЮ СТОРОНУ! 🔄`;
                action = () => { flipCoinTo(player); };
                break;
            case 'bomb':
                cd = 5;
                emoji = '💥';
                effectMsg = `💥 ${player === 'A' ? playerAName : playerBName} УСТРОИЛ ВЗРЫВ! МОНЕТКА ПЕРЕВЕРНУЛАСЬ СЛУЧАЙНО! 💥`;
                action = () => { randomExplosion(player); };
                break;
        }
        
        if (cooldowns[player][skill] > 0) return;
        cooldowns[player][skill] = cd;
        updateCooldownUI();
        
        const rect = document.querySelector(`.player-card.${player === 'A' ? 'left' : 'right'}`).getBoundingClientRect();
        const targetRect = document.querySelector(`.player-card.${player === 'A' ? 'right' : 'left'}`).getBoundingClientRect();
        createEffect(emoji, rect.left + 50, rect.top + 30, (targetRect.left - rect.left) + (player === 'A' ? 100 : -100), -50);
        
        const status = document.getElementById('statusText');
        status.innerHTML = effectMsg;
        setTimeout(() => { if (gameActive && !roundResult) status.innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ⚡'; }, 2000);
        
        if (action) action();
    }
    
    // ==================== БРОСОК МОНЕТКИ ПО КЛИКУ/ТАПУ ====================
    function throwCoin() {
        if (isFalling || gameActive || roundResult || isAnimating) return;
        
        isFalling = true;
        
        animateCoinFlip(() => {
            coinSide = Math.random() < 0.5 ? 'heads' : 'tails';
            const coin = document.getElementById('coin');
            const coinSideText = document.getElementById('coinSideText');
            
            if (coinSide === 'heads') {
                coin.textContent = '🦅';
                coinSideText.innerHTML = `🦅 ВЫПАЛ ОРЁЛ! ${playerAName} ВЕДЁТ! 🦅`;
            } else {
                coin.textContent = '🪨';
                coinSideText.innerHTML = `🪨 ВЫПАЛА РЕШКА! ${playerBName} ВЕДЁТ! 🪨`;
            }
            
            gameActive = true;
            isFalling = false;
            timeLeft = 30;
            document.getElementById('timerValue').textContent = timeLeft;
            document.getElementById('statusText').innerHTML = '⚡ БИТВА ПРОДОЛЖАЕТСЯ! ИСПОЛЬЗУЙТЕ СПОСОБНОСТИ! ⚡';
            startTimer();
            updateCooldownUI();
        });
    }
    
    // Клик/тап по монетке
    const coinElement = document.getElementById('coin');
    coinElement.addEventListener('click', (e) => {
        e.stopPropagation();
        throwCoin();
    });
    
    coinElement.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        throwCoin();
    });
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive || roundResult) return;
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timerValue').textContent = timeLeft;
                
                if (timeLeft <= 5) {
                    document.getElementById('timerValue').style.color = '#FF0000';
                    document.getElementById('timerValue').style.textShadow = '0 0 10px #FF0000';
                } else {
                    document.getElementById('timerValue').style.color = '#FFFF00';
                }
            }
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000);
    }
    
    function endGame() {
        gameActive = false;
        roundResult = true;
        
        let winnerName = '';
        let winnerAvatar = '';
        
        if (coinSide === 'heads') {
            winnerName = playerAName;
            winnerAvatar = playerAAvatar;
        } else if (coinSide === 'tails') {
            winnerName = playerBName;
            winnerAvatar = playerBAvatar;
        }
        
        const overlay = document.createElement('div');
        overlay.className = 'result-overlay';
        overlay.innerHTML = `
            <div class="result-text">🏆 ПОБЕДИЛ ${winnerName} 🏆</div>
            <div class="result-text" style="font-size: 40px; margin-top: 10px;">${winnerAvatar}</div>
            <div class="result-text" style="font-size: 16px; margin-top: 20px;">${userQuestion}</div>
            <button class="result-close" id="resultCloseBtn">✖ В МЕНЮ ✖</button>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('resultCloseBtn').onclick = () => {
            window.location.href = 'main.html';
        };
    }
    
    function resetGame() {
        gameActive = false;
        isFalling = false;
        roundResult = null;
        coinSide = null;
        isAnimating = false;
        timeLeft = 30;
        document.getElementById('timerValue').textContent = timeLeft;
        document.getElementById('timerValue').style.color = '#FFFF00';
        document.getElementById('coin').textContent = '🪙';
        document.getElementById('coinSideText').innerHTML = '🪙 МОНЕТКА ЖДЁТ БРОСКА';
        document.getElementById('statusText').innerHTML = '⚡ НАЖМИТЕ НА МОНЕТКУ, ЧТОБЫ БРОСИТЬ! ⚡';
        
        cooldowns = {
            A: { tomato: 0, flip: 0, bomb: 0 },
            B: { tomato: 0, flip: 0, bomb: 0 }
        };
        
        blocked = { A: false, B: false };
        if (blockTimers.A) clearTimeout(blockTimers.A);
        if (blockTimers.B) clearTimeout(blockTimers.B);
        
        if (timerInterval) clearInterval(timerInterval);
        
        updateCooldownUI();
    }
    
    // ==================== КЛАВИАТУРА (ПРОБЕЛ ТОЖЕ РАБОТАЕТ) ====================
    function handleKeyDown(e) {
        const key = e.key.toLowerCase();
        
        if (key === ' ') {
            e.preventDefault();
            throwCoin();
            return;
        }
        
        if (key === 'q') { e.preventDefault(); useAbility('A', 'tomato'); }
        if (key === 'w') { e.preventDefault(); useAbility('A', 'flip'); }
        if (key === 'e') { e.preventDefault(); useAbility('A', 'bomb'); }
        
        if (key === 'u') { e.preventDefault(); useAbility('B', 'tomato'); }
        if (key === 'i') { e.preventDefault(); useAbility('B', 'flip'); }
        if (key === 'o') { e.preventDefault(); useAbility('B', 'bomb'); }
    }
    
    window.addEventListener('keydown', handleKeyDown);
    
    document.getElementById('skillA1').onclick = () => useAbility('A', 'tomato');
    document.getElementById('skillA2').onclick = () => useAbility('A', 'flip');
    document.getElementById('skillA3').onclick = () => useAbility('A', 'bomb');
    document.getElementById('skillB1').onclick = () => useAbility('B', 'tomato');
    document.getElementById('skillB2').onclick = () => useAbility('B', 'flip');
    document.getElementById('skillB3').onclick = () => useAbility('B', 'bomb');
    
    startCooldownTimers();
    
    // ==================== СЕНСОРНОЕ УПРАВЛЕНИЕ ДЛЯ СПОСОБНОСТЕЙ ====================
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    
    document.addEventListener('touchstart', (e) => {
        if (!gameActive || isFalling || roundResult || isAnimating) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
    });
    
    document.addEventListener('touchend', (e) => {
        if (!gameActive || isFalling || roundResult || isAnimating) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX;
        const deltaY = touchEndY - touchStartY;
        const deltaTime = Date.now() - touchStartTime;
        
        const isLeftSide = touchStartX < window.innerWidth / 2;
        const player = isLeftSide ? 'A' : 'B';
        
        if (deltaTime < 300 && Math.abs(deltaX) < 20 && Math.abs(deltaY) < 20) {
            e.preventDefault();
            useAbility(player, 'tomato');
            document.getElementById('touchHint').innerHTML = '🍅 ПОМИДОР! 🍅';
            setTimeout(() => document.getElementById('touchHint').innerHTML = '👇 ТАПНИ ИЛИ СВАЙПНИ ДЛЯ СПОСОБНОСТЕЙ 👆', 1000);
        }
        else if (deltaY < -40 && Math.abs(deltaX) < 50) {
            e.preventDefault();
            useAbility(player, 'flip');
            document.getElementById('touchHint').innerHTML = '🔄 ПЕРЕВОРОТ! 🔄';
            setTimeout(() => document.getElementById('touchHint').innerHTML = '👇 ТАПНИ ИЛИ СВАЙПНИ ДЛЯ СПОСОБНОСТЕЙ 👆', 1000);
        }
        else if (deltaY > 40 && Math.abs(deltaX) < 50) {
            e.preventDefault();
            useAbility(player, 'bomb');
            document.getElementById('touchHint').innerHTML = '💥 ВЗРЫВ! 💥';
            setTimeout(() => document.getElementById('touchHint').innerHTML = '👇 ТАПНИ ИЛИ СВАЙПНИ ДЛЯ СПОСОБНОСТЕЙ 👆', 1000);
        }
    });
    
    // ==================== ОБУЧЕНИЕ ====================
    let tutorialStep = 0;
    const tutorialSteps = [
        { title: '⚡ МОНЕТОБОЙНЯ ⚡', content: 'Добро пожаловать в битву за монетку! Это игра на реакцию и стратегию.' },
        { title: '🎲 КАК ИГРАТЬ 🎲', content: 'Нажмите на монетку, чтобы бросить. После этого начнётся битва на 30 секунд.\n\nВаша задача — чтобы в конце раунда монетка лежала на вашей стороне.' },
        { title: '🍅 СПОСОБНОСТИ 🍅', content: '🍅 ПОМИДОР (Q/U или ТАП) — блокирует кнопки соперника на 3 сек (кулдаун 6 сек)\n🔄 ПЕРЕВОРОТ (W/I или СВАЙП ВВЕРХ) — переворот на вашу сторону (кулдаун 9 сек)\n💥 ВЗРЫВ (E/O или СВАЙП ВНИЗ) — случайный переворот (кулдаун 5 сек)' },
        { title: '⌨️ УПРАВЛЕНИЕ ⌨️', content: `${playerAName}: [Q] ПОМИДОР | [W] ПЕРЕВОРОТ | [E] ВЗРЫВ\n\n${playerBName}: [U] ПОМИДОР | [I] ПЕРЕВОРОТ | [O] ВЗРЫВ\n\n📱 ТАП — помидор | СВАЙП ВВЕРХ — переворот | СВАЙП ВНИЗ — взрыв` },
        { title: '🏆 ПОБЕДА 🏆', content: 'Когда время выйдет, побеждает тот, чья сторона выпала на монетке.\n\nИспользуйте способности с умом!\n\nУдачи!' }
    ];
    
    function showTutorial() {
        if (tutorialShown) { resetGame(); return; }
        
        function showStep() {
            const step = tutorialSteps[tutorialStep];
            const overlay = document.createElement('div');
            overlay.className = 'tutorial-overlay';
            let exampleHtml = '';
            if (tutorialStep === 2) {
                exampleHtml = `<div class="tutorial-demo"><div class="tutorial-key up"><div class="tutorial-key-letter">🍅</div><div class="tutorial-key-label">ТАП</div></div><div class="tutorial-key up"><div class="tutorial-key-letter">🔄</div><div class="tutorial-key-label">СВАЙП ↑</div></div><div class="tutorial-key down"><div class="tutorial-key-letter">💥</div><div class="tutorial-key-label">СВАЙП ↓</div></div></div>`;
            }
            overlay.innerHTML = `<div class="tutorial-card"><div class="tutorial-title">${step.title}</div><div class="tutorial-content">${step.content.replace(/\n/g, '<br>')}</div>${exampleHtml}<button class="tutorial-next" id="tutorialNextBtn">${tutorialStep === tutorialSteps.length - 1 ? 'НАЧАТЬ БИТВУ →' : 'ДАЛЕЕ →'}</button></div>`;
            document.body.appendChild(overlay);
            document.getElementById('tutorialNextBtn').onclick = () => {
                overlay.remove();
                tutorialStep++;
                if (tutorialStep < tutorialSteps.length) showStep();
                else { tutorialShown = true; resetGame(); }
            };
        }
        showStep();
    }
    
    showTutorial();
</script>
</body>
</html>
