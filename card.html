<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ КАРТОЧНЫЙ БЛИЦ ⚡ Больше / Меньше</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0A0A2A, #020210);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: manipulation;
        }

        /* Счёт */
        .score-bars {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            gap: 20px;
            z-index: 10;
        }

        .score-card {
            flex: 1;
            background: rgba(14,14,42,0.9);
            border: 3px solid;
            padding: 8px 12px;
            text-align: center;
            backdrop-filter: blur(4px);
            border-radius: 20px;
        }

        .score-card.left { border-color: #FF00FF; box-shadow: 0 0 15px #FF00FF; }
        .score-card.right { border-color: #00FFFF; box-shadow: 0 0 15px #00FFFF; }

        .player-name {
            font-size: 10px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .score-bar-bg {
            background: #330000;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .score-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-bar.left { background: linear-gradient(90deg, #FF00FF, #FF69B4); }
        .score-bar.right { background: linear-gradient(90deg, #00FFFF, #00BFFF); }

        .score-value {
            font-size: 9px;
            margin-top: 5px;
            color: #FF69B4;
        }

        /* Арена */
        .arena {
            position: relative;
            width: 500px;
            height: 380px;
            background: linear-gradient(180deg, #0A0A2A 0%, #15002A 100%);
            border: 3px solid #FF00FF;
            box-shadow: 0 0 40px rgba(255,0,255,0.5);
            border-radius: 30px;
            overflow: visible;
            margin: 60px auto 20px;
        }

        /* Подложка под карту — бежевый фон */
        .card-slot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 340px;
            background: radial-gradient(circle at center, #F5E6C8, #DDBB88);
            border-radius: 25px;
            box-shadow: 0 0 60px #FF00FF, inset 0 0 15px rgba(255,215,150,0.8);
            border: 3px solid #FF00FF;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .card {
            font-size: 180px;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
            animation: cardPulse 0.8s infinite alternate;
            display: inline-block;
            background: transparent;
            border-radius: 20px;
            padding: 10px 20px;
            transition: all 0.2s ease;
        }

        @keyframes cardPulse {
            0% { filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 50px #FF00FF); transform: scale(1.02); }
        }

        .card-flip {
            animation: flipCard 0.3s ease-in-out;
        }

        @keyframes flipCard {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(90deg); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .card-value-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #FFFF00;
            text-shadow: 0 0 15px #FF00FF;
            background: rgba(0,0,0,0.7);
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid #FF00FF;
            white-space: nowrap;
            z-index: 5;
        }

        .result-area {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 9px;
            color: #FF69B4;
            background: rgba(0,0,0,0.8);
            padding: 8px;
            margin: 0 15px;
            border-radius: 20px;
            z-index: 3;
            border: 1px solid #FF00FF;
        }

        .round-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #FF00FF;
            color: white;
            font-size: 9px;
            padding: 4px 15px;
            border-radius: 30px;
            box-shadow: 0 0 25px #FF00FF;
            z-index: 10;
            white-space: nowrap;
        }

        /* Игровая панель */
        .game-panel {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            width: 90%;
            max-width: 650px;
        }

        .bet-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .bet-choice {
            text-align: center;
        }

        .bet-key {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.08s linear;
            touch-action: manipulation;
        }

        .bet-key.up {
            background: linear-gradient(135deg, #00AA00, #00FF00);
            border: 3px solid #AAFFAA;
            box-shadow: 0 0 25px #00FF00;
        }

        .bet-key.down {
            background: linear-gradient(135deg, #CC0000, #FF4444);
            border: 3px solid #FFAAAA;
            box-shadow: 0 0 25px #FF4444;
        }

        .bet-key.pressed {
            transform: scale(0.95);
        }

        .bet-letter {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px black;
        }

        .bet-label {
            font-size: 7px;
            color: white;
            margin-top: 3px;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 15px;
        }

        .bet-name {
            font-size: 7px;
            color: #FF69B4;
            margin-top: 6px;
        }

        /* Таймер */
        .timer-wrapper {
            background: #1A0033;
            border-radius: 15px;
            padding: 3px;
            border: 2px solid #FF00FF;
            box-shadow: 0 0 15px #FF00FF;
            margin-top: 15px;
        }

        .timer-bar {
            width: 100%;
            height: 12px;
            background: #330000;
            border-radius: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #FFFF00, #FF6600);
            transition: width 0.05s linear;
        }

        /* Сенсорные подсказки */
        .touch-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 7px;
            color: #FF69B4;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            margin: 0 20px;
            border-radius: 15px;
        }

        .back-btn {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #0A0A2A;
            border: 2px solid #FF00FF;
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 15px;
            cursor: pointer;
            z-index: 10;
            transition: 0.1s;
            border-radius: 30px;
        }

        .back-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* Всплывающие очки */
        .score-pop {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            animation: scoreFloat 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 200;
            text-shadow: 0 0 10px black;
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
        }

        /* Анимация победы */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            animation: victoryFade 0.3s ease-out;
        }

        @keyframes victoryFade {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .victory-text {
            font-size: 32px;
            color: #FFFF00;
            text-shadow: 0 0 20px #FF00FF, 0 0 40px #FF00FF;
            text-align: center;
            padding: 20px;
            animation: victoryPulse 0.8s infinite;
        }

        .victory-avatar {
            font-size: 70px;
            margin: 15px;
            filter: drop-shadow(0 0 20px gold);
        }

        .victory-sub {
            font-size: 14px;
            color: #00FFFF;
            margin-top: 15px;
        }

        .victory-close {
            margin-top: 40px;
            background: #FF00FF;
            border: none;
            padding: 10px 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.1s;
        }

        .victory-close:active {
            transform: scale(0.95);
        }

        @keyframes victoryPulse {
            0%,100% { transform: scale(1); text-shadow: 0 0 20px #FF00FF; }
            50% { transform: scale(1.05); text-shadow: 0 0 40px #FFFF00; }
        }

        /* Обучение */
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .tutorial-card {
            background: #0e0e2a;
            border: 3px solid #FF00FF;
            border-radius: 30px;
            padding: 25px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px #FF00FF;
            animation: cardAppear 0.3s ease-out;
        }

        @keyframes cardAppear {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tutorial-title {
            font-size: 16px;
            color: #FFFF00;
            margin-bottom: 15px;
        }

        .tutorial-content {
            font-size: 9px;
            color: #00FFFF;
            line-height: 1.8;
            text-align: left;
            margin: 10px 0;
        }

        .tutorial-bet-demo {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .tutorial-key {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tutorial-key.up {
            background: #00AA00;
            border: 2px solid #AAFFAA;
        }

        .tutorial-key.down {
            background: #CC0000;
            border: 2px solid #FFAAAA;
        }

        .tutorial-key-letter {
            font-size: 20px;
            color: white;
        }

        .tutorial-next {
            background: #FF00FF;
            border: none;
            padding: 8px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            border-radius: 30px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .arena { width: 95%; height: 320px; }
            .card-slot { width: 200px; height: 260px; }
            .card { font-size: 120px; }
            .bet-key { width: 60px; height: 60px; }
            .bet-letter { font-size: 22px; }
            .victory-text { font-size: 22px; }
            .victory-avatar { font-size: 50px; }
            .game-panel { bottom: 100px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="score-bars">
        <div class="score-card left">
            <div class="player-name" id="playerAName">⚡ RYO</div>
            <div class="score-bar-bg"><div class="score-bar left" id="scoreLeft" style="width: 0%"></div></div>
            <div class="score-value" id="scoreLeftValue">0</div>
        </div>
        <div class="score-card right">
            <div class="player-name" id="playerBName">🌊 KAI</div>
            <div class="score-bar-bg"><div class="score-bar right" id="scoreRight" style="width: 0%"></div></div>
            <div class="score-value" id="scoreRightValue">0</div>
        </div>
    </div>

    <div class="arena">
        <div class="round-badge" id="roundBadge">⚡ РАУНД 1 ⚡</div>
        <div class="card-slot">
            <div class="card" id="card">🃟</div>
        </div>
        <div class="card-value-text" id="cardValue">?</div>
        <div class="result-area" id="resultArea">⚡ СДЕЛАЙТЕ СТАВКИ! ⚡</div>
    </div>

    <div class="game-panel">
        <div class="bet-buttons">
            <div class="bet-choice">
                <div class="bet-key up" id="betUpLeft">
                    <div class="bet-letter">▲</div>
                    <div class="bet-label">БОЛЬШЕ</div>
                </div>
                <div class="bet-name" id="betNameLeftUp">ИГРОК A: W</div>
            </div>
            <div class="bet-choice">
                <div class="bet-key down" id="betDownLeft">
                    <div class="bet-letter">▼</div>
                    <div class="bet-label">МЕНЬШЕ</div>
                </div>
                <div class="bet-name" id="betNameLeftDown">ИГРОК A: S</div>
            </div>
            <div class="bet-choice">
                <div class="bet-key up" id="betUpRight">
                    <div class="bet-letter">▲</div>
                    <div class="bet-label">БОЛЬШЕ</div>
                </div>
                <div class="bet-name" id="betNameRightUp">ИГРОК B: ↑</div>
            </div>
            <div class="bet-choice">
                <div class="bet-key down" id="betDownRight">
                    <div class="bet-letter">▼</div>
                    <div class="bet-label">МЕНЬШЕ</div>
                </div>
                <div class="bet-name" id="betNameRightDown">ИГРОК B: ↓</div>
            </div>
        </div>
        <div class="timer-wrapper">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div class="touch-hint" id="touchHint">👇 НАЖМИ НА КНОПКУ ИЛИ СДЕЛАЙ СВАЙП 👆</div>

    <button class="back-btn" id="backBtn">✖ ВЫЙТИ ✖</button>
</div>

<script>
    // ==================== ПОЛУЧАЕМ ИМЕНА И СМАЙЛИКИ ИЗ URL ====================
    const urlParams = new URLSearchParams(window.location.search);
    let playerAName = urlParams.get('p1') || 'RYO';
    let playerAAvatar = urlParams.get('p1avatar') || '⚡';
    let playerBName = urlParams.get('p2') || 'KAI';
    let playerBAvatar = urlParams.get('p2avatar') || '🌊';

    // Обновляем имена игроков везде
    document.getElementById('playerAName').innerHTML = `${playerAAvatar} ${playerAName}`;
    document.getElementById('playerBName').innerHTML = `${playerBAvatar} ${playerBName}`;
    document.getElementById('betNameLeftUp').innerHTML = `${playerAName}: W`;
    document.getElementById('betNameLeftDown').innerHTML = `${playerAName}: S`;
    document.getElementById('betNameRightUp').innerHTML = `${playerBName}: ↑`;
    document.getElementById('betNameRightDown').innerHTML = `${playerBName}: ↓`;

    // ==================== КАРТЫ ====================
    const CARD_LIST = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const CARD_EMOJI = {
        '6': '🃖', '7': '🃗', '8': '🃘', '9': '🃙', '10': '🃚',
        'J': '🃛', 'Q': '🃝', 'K': '🃞', 'A': '🃑'
    };
    const CARD_VALUE = {
        '6': 6, '7': 7, '8': 8, '9': 9, '10': 10,
        'J': 11, 'Q': 12, 'K': 13, 'A': 14
    };

    function getRandomCard() {
        return CARD_LIST[Math.floor(Math.random() * CARD_LIST.length)];
    }

    // ==================== СОСТОЯНИЕ ====================
    let scores = { left: 0, right: 0 };
    let gameActive = true;
    let tutorialShown = false;

    let currentCard = null;
    let nextCard = null;
    let waitingForBets = false;
    let timerInterval = null;
    let timeLeft = 4.0;
    let roundNumber = 1;

    let bets = { left: null, right: null };

    const WIN_GOAL = 100;
    const WIN_POINTS = 10;
    const LOSE_POINTS = 5;

    // DOM элементы
    const cardElement = document.getElementById('card');
    const cardValueText = document.getElementById('cardValue');
    const resultArea = document.getElementById('resultArea');
    const timerFill = document.getElementById('timerFill');
    const roundBadge = document.getElementById('roundBadge');
    const touchHint = document.getElementById('touchHint');

    // ==================== ФУНКЦИЯ ПОБЕДЫ ====================
    function showVictory(winner, winnerName, winnerAvatar) {
        gameActive = false;
        waitingForBets = false;
        if (timerInterval) clearInterval(timerInterval);

        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = `
            <div class="victory-text">🏆 ПОБЕДИЛ ${winnerName} 🏆</div>
            <div class="victory-avatar">${winnerAvatar}</div>
            <div class="victory-sub">⚡ КАРТОЧНЫЙ БЛИЦ ⚡</div>
            <button class="victory-close" id="victoryCloseBtn">✖ В МЕНЮ ✖</button>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('victoryCloseBtn').onclick = () => {
            window.location.href = 'games.html';
        };
    }

    function updateScoreUI() {
        const leftPercent = (scores.left / WIN_GOAL) * 100;
        const rightPercent = (scores.right / WIN_GOAL) * 100;
        document.getElementById('scoreLeft').style.width = `${leftPercent}%`;
        document.getElementById('scoreRight').style.width = `${rightPercent}%`;
        document.getElementById('scoreLeftValue').innerText = Math.floor(scores.left);
        document.getElementById('scoreRightValue').innerText = Math.floor(scores.right);

        if (scores.left >= WIN_GOAL && gameActive) {
            showVictory('left', playerAName, playerAAvatar);
        }
        if (scores.right >= WIN_GOAL && gameActive) {
            showVictory('right', playerBName, playerBAvatar);
        }
    }

    function showScorePop(points, isLeft) {
        const rect = (isLeft ? document.querySelector('.score-card.left') : document.querySelector('.score-card.right')).getBoundingClientRect();
        const pop = document.createElement('div');
        pop.className = 'score-pop';
        pop.textContent = points > 0 ? `+${points}` : `${points}`;
        pop.style.left = rect.left + 70 + 'px';
        pop.style.top = rect.top + 25 + 'px';
        pop.style.position = 'fixed';
        pop.style.color = isLeft ? '#FF69B4' : '#00FFFF';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 600);
    }

    function flipCardAndShowNew(newCard) {
        return new Promise((resolve) => {
            cardElement.classList.add('card-flip');
            setTimeout(() => {
                cardElement.textContent = CARD_EMOJI[newCard];
                cardValueText.textContent = newCard;
                cardElement.classList.remove('card-flip');
                resolve();
            }, 150);
        });
    }

    async function evaluateRound() {
        if (!waitingForBets) return;
        waitingForBets = false;
        if (timerInterval) clearInterval(timerInterval);

        const currentVal = CARD_VALUE[currentCard];
        const nextVal = CARD_VALUE[nextCard];
        const isHigher = nextVal > currentVal;

        await flipCardAndShowNew(nextCard);

        // Подсчёт очков
        if (bets.left === 'up') {
            if (isHigher) {
                scores.left += WIN_POINTS;
                showScorePop(WIN_POINTS, true);
            } else {
                scores.left = Math.max(0, scores.left - LOSE_POINTS);
                showScorePop(-LOSE_POINTS, true);
            }
        } else if (bets.left === 'down') {
            if (!isHigher) {
                scores.left += WIN_POINTS;
                showScorePop(WIN_POINTS, true);
            } else {
                scores.left = Math.max(0, scores.left - LOSE_POINTS);
                showScorePop(-LOSE_POINTS, true);
            }
        } else {
            scores.left = Math.max(0, scores.left - LOSE_POINTS);
            showScorePop(-LOSE_POINTS, true);
        }

        if (bets.right === 'up') {
            if (isHigher) {
                scores.right += WIN_POINTS;
                showScorePop(WIN_POINTS, false);
            } else {
                scores.right = Math.max(0, scores.right - LOSE_POINTS);
                showScorePop(-LOSE_POINTS, false);
            }
        } else if (bets.right === 'down') {
            if (!isHigher) {
                scores.right += WIN_POINTS;
                showScorePop(WIN_POINTS, false);
            } else {
                scores.right = Math.max(0, scores.right - LOSE_POINTS);
                showScorePop(-LOSE_POINTS, false);
            }
        } else {
            scores.right = Math.max(0, scores.right - LOSE_POINTS);
            showScorePop(-LOSE_POINTS, false);
        }

        updateScoreUI();

        resultArea.innerHTML = `🎴 ВЫПАЛА КАРТА ${nextCard} (${isHigher ? 'БОЛЬШЕ' : 'МЕНЬШЕ'}) 🎴`;
        touchHint.innerHTML = isHigher ? '⬆️ БОЛЬШЕ! ⬆️' : '⬇️ МЕНЬШЕ! ⬇️';

        setTimeout(() => {
            if (gameActive) startNewRound();
        }, 600);
    }

    function startNewRound() {
        if (!gameActive) return;

        roundNumber++;
        roundBadge.innerHTML = `⚡ РАУНД ${roundNumber} ⚡`;

        currentCard = nextCard;
        nextCard = getRandomCard();

        cardElement.textContent = CARD_EMOJI[currentCard];
        cardValueText.textContent = currentCard;

        bets = { left: null, right: null };
        waitingForBets = true;
        timeLeft = 4.0;
        timerFill.style.width = '100%';
        resultArea.innerHTML = '⚡ СДЕЛАЙТЕ СТАВКИ! ⚡';
        touchHint.innerHTML = '👇 НАЖМИ НА КНОПКУ ИЛИ СДЕЛАЙ СВАЙП 👆';

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!waitingForBets) return;
            timeLeft -= 0.05;
            const percent = (timeLeft / 4.0) * 100;
            timerFill.style.width = `${Math.max(0, percent)}%`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (waitingForBets) {
                    evaluateRound();
                }
            }
        }, 50);
    }

    function placeBet(player, bet) {
        if (!gameActive || !waitingForBets) return;
        if (bets[player] !== null) {
            resultArea.innerHTML = `⚠️ ${player === 'left' ? playerAName : playerBName} УЖЕ СДЕЛАЛ СТАВКУ! ⚠️`;
            return;
        }

        bets[player] = bet;
        const betText = bet === 'up' ? 'БОЛЬШЕ ▲' : 'МЕНЬШЕ ▼';
        resultArea.innerHTML = `✅ ${player === 'left' ? playerAName : playerBName} СТАВИТ НА ${betText}! ✅`;

        if (bets.left !== null && bets.right !== null) {
            clearInterval(timerInterval);
            evaluateRound();
        }
    }

    function animateButtonPress(element) {
        element.classList.add('pressed');
        setTimeout(() => element.classList.remove('pressed'), 100);
    }

    // ==================== СЕНСОРНОЕ УПРАВЛЕНИЕ (СВАЙПЫ) ====================
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

    document.addEventListener('touchstart', (e) => {
        if (!gameActive || !waitingForBets) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
    });

    document.addEventListener('touchend', (e) => {
        if (!gameActive || !waitingForBets) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX;
        const deltaY = touchEndY - touchStartY;
        const deltaTime = Date.now() - touchStartTime;
        
        if (deltaTime < 300 && Math.abs(deltaX) < 30 && Math.abs(deltaY) < 30) {
            e.preventDefault();
            // Тап — ничего не делаем, чтобы не мешать
        }
        else if (deltaX > 50 && Math.abs(deltaY) < 50) {
            e.preventDefault();
            // Свайп вправо — БОЛЬШЕ для текущего игрока? Нужно определить кто водит?
            // В этой игре ходов нет, оба игрока одновременно. Свайп вправо = ставка БОЛЬШЕ для левого?
            // Сделаем проще: свайп вверх/вниз
        }
        else if (deltaY < -50 && Math.abs(deltaX) < 50) {
            e.preventDefault();
            touchHint.innerHTML = '🟢 СТАВКА БОЛЬШЕ ДЛЯ ВАС? НАЖМИТЕ КНОПКУ 🟢';
        }
        else if (deltaY > 50 && Math.abs(deltaX) < 50) {
            e.preventDefault();
            touchHint.innerHTML = '🔴 СТАВКА МЕНЬШЕ ДЛЯ ВАС? НАЖМИТЕ КНОПКУ 🔴';
        }
    });

    // ==================== УПРАВЛЕНИЕ ====================
    function handleKeyDown(e) {
        if (!gameActive) return;
        const key = e.key.toLowerCase();

        if (key === 'w') {
            e.preventDefault();
            animateButtonPress(document.getElementById('betUpLeft'));
            placeBet('left', 'up');
        }
        if (key === 's') {
            e.preventDefault();
            animateButtonPress(document.getElementById('betDownLeft'));
            placeBet('left', 'down');
        }
        if (key === 'arrowup') {
            e.preventDefault();
            animateButtonPress(document.getElementById('betUpRight'));
            placeBet('right', 'up');
        }
        if (key === 'arrowdown') {
            e.preventDefault();
            animateButtonPress(document.getElementById('betDownRight'));
            placeBet('right', 'down');
        }
    }

    document.getElementById('betUpLeft').onclick = () => { if (gameActive && waitingForBets) { animateButtonPress(document.getElementById('betUpLeft')); placeBet('left', 'up'); } };
    document.getElementById('betDownLeft').onclick = () => { if (gameActive && waitingForBets) { animateButtonPress(document.getElementById('betDownLeft')); placeBet('left', 'down'); } };
    document.getElementById('betUpRight').onclick = () => { if (gameActive && waitingForBets) { animateButtonPress(document.getElementById('betUpRight')); placeBet('right', 'up'); } };
    document.getElementById('betDownRight').onclick = () => { if (gameActive && waitingForBets) { animateButtonPress(document.getElementById('betDownRight')); placeBet('right', 'down'); } };

    window.addEventListener('keydown', handleKeyDown);
    document.getElementById('backBtn').onclick = () => window.location.href = 'games.html';

    // ==================== ОБУЧЕНИЕ ====================
    let tutorialStep = 0;
    const tutorialSteps = [
        { title: '⚡ КАРТОЧНЫЙ БЛИЦ ⚡', content: 'Добро пожаловать в игру на повышение ставки! Классическая игра "Больше / Меньше".' },
        { title: '🎴 КАК ИГРАТЬ 🎴', content: 'Показывается карта. Вы должны угадать: следующая карта будет БОЛЬШЕ или МЕНЬШЕ?\n\n6 < 7 < 8 < 9 < 10 < J < Q < K < A' },
        { title: '🎮 СТАВКИ 🎮', content: 'У каждого игрока есть 4 секунды, чтобы сделать ставку:\n\n🟢 БОЛЬШЕ (▲) — следующая карта будет больше\n🔴 МЕНЬШЕ (▼) — следующая карта будет меньше' },
        { title: '💰 ОЧКИ 💰', content: '✅ Угадал → +10 очков\n❌ Не угадал → -5 очков\n⏰ Не сделал ставку → -5 очков\n\nПервый до 100 очков — ПОБЕДИТЕЛЬ!' },
        { title: '⌨️ УПРАВЛЕНИЕ ⌨️', content: `${playerAName}: [W] = БОЛЬШЕ | [S] = МЕНЬШЕ\n\n${playerBName}: [↑] = БОЛЬШЕ | [↓] = МЕНЬШЕ\n\nМожно кликать мышкой!` }
    ];

    function showTutorial() {
        if (tutorialShown) { resetGame(); return; }

        function showStep() {
            const step = tutorialSteps[tutorialStep];
            const overlay = document.createElement('div');
            overlay.className = 'tutorial-overlay';
            let exampleHtml = '';
            if (tutorialStep === 2) {
                exampleHtml = `<div class="tutorial-bet-demo">
                    <div class="tutorial-key up"><div class="tutorial-key-letter">▲</div><div style="font-size:7px; color:white;">БОЛЬШЕ</div></div>
                    <div class="tutorial-key down"><div class="tutorial-key-letter">▼</div><div style="font-size:7px; color:white;">МЕНЬШЕ</div></div>
                </div>`;
            }
            overlay.innerHTML = `<div class="tutorial-card"><div class="tutorial-title">${step.title}</div><div class="tutorial-content">${step.content.replace(/\n/g, '<br>')}</div>${exampleHtml}<button class="tutorial-next" id="tutorialNextBtn">${tutorialStep === tutorialSteps.length - 1 ? 'НАЧАТЬ ИГРУ →' : 'ДАЛЕЕ →'}</button></div>`;
            document.body.appendChild(overlay);
            document.getElementById('tutorialNextBtn').onclick = () => {
                overlay.remove();
                tutorialStep++;
                if (tutorialStep < tutorialSteps.length) showStep();
                else { tutorialShown = true; resetGame(); }
            };
        }
        showStep();
    }

    function resetGame() {
        scores = { left: 0, right: 0 };
        gameActive = true;
        roundNumber = 1;
        bets = { left: null, right: null };

        if (timerInterval) clearInterval(timerInterval);

        currentCard = getRandomCard();
        nextCard = getRandomCard();

        cardElement.textContent = CARD_EMOJI[currentCard];
        cardValueText.textContent = currentCard;
        roundBadge.innerHTML = `⚡ РАУНД ${roundNumber} ⚡`;

        updateScoreUI();

        waitingForBets = true;
        timeLeft = 4.0;
        timerFill.style.width = '100%';
        resultArea.innerHTML = '⚡ СДЕЛАЙТЕ СТАВКИ! ⚡';
        touchHint.innerHTML = '👇 НАЖМИ НА КНОПКУ ИЛИ СДЕЛАЙ СВАЙП 👆';

        timerInterval = setInterval(() => {
            if (!waitingForBets) return;
            timeLeft -= 0.05;
            const percent = (timeLeft / 4.0) * 100;
            timerFill.style.width = `${Math.max(0, percent)}%`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (waitingForBets) {
                    evaluateRound();
                }
            }
        }, 50);
    }

    showTutorial();
</script>
</body>
</html>
