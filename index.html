<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CouplePlay — Авторизация</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0A0A2A, #020210);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 550px;
            background: rgba(14,14,42,0.95);
            border: 3px solid #FF00FF;
            border-radius: 40px;
            padding: 35px 25px;
            box-shadow: 0 0 60px rgba(255,0,255,0.3);
            backdrop-filter: blur(10px);
        }

        .auth-title {
            text-align: center;
            font-size: 22px;
            color: #FFFF00;
            text-shadow: 0 0 10px #FF00FF;
            margin-bottom: 25px;
        }

        .telegram-card {
            background: #0A0A2A;
            border: 2px solid #00FFFF;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .telegram-avatar {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .telegram-name {
            font-size: 14px;
            color: #00FFFF;
            margin-bottom: 5px;
        }

        .telegram-id {
            font-size: 9px;
            color: #FF69B4;
        }

        .players-row {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .player-card {
            flex: 1;
            background: #0A0A2A;
            border: 2px solid;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
        }

        .player-card.left { border-color: #FF00FF; }
        .player-card.right { border-color: #00FFFF; }

        .player-name-input {
            width: 100%;
            background: #0A0A2A;
            border: 1px solid #FF69B4;
            border-radius: 15px;
            padding: 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #FF69B4;
            text-align: center;
            margin: 10px 0;
        }

        .avatar-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .avatar-option {
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            border-radius: 12px;
            transition: all 0.1s;
        }

        .avatar-option:hover {
            transform: scale(1.1);
        }

        .avatar-option.selected {
            background: rgba(255,0,255,0.4);
            box-shadow: 0 0 10px #FF00FF;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #FF00FF, #FF69B4);
            border: none;
            border-radius: 30px;
            padding: 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            margin-top: 10px;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .demo-badge {
            text-align: center;
            font-size: 8px;
            color: #FF69B4;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .players-row { flex-direction: column; }
            .auth-container { padding: 25px 20px; }
            .avatar-option { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-title">⚡ COUPLEPLAY ⚡</div>

    <div class="telegram-card" id="telegramCard">
        <div class="telegram-avatar" id="telegramAvatar">🤖</div>
        <div class="telegram-name" id="telegramName">Загрузка...</div>
        <div class="telegram-id" id="telegramId"></div>
    </div>

    <div class="players-row">
        <div class="player-card left">
            <div style="color:#FF00FF; font-size:9px; margin-bottom:8px;">🔴 ИГРОК A</div>
            <input type="text" id="playerAName" class="player-name-input" placeholder="Имя" value="RYO">
            <div class="avatar-grid" id="avatarAGrid"></div>
        </div>

        <div class="player-card right">
            <div style="color:#00FFFF; font-size:9px; margin-bottom:8px;">🔵 ИГРОК B</div>
            <input type="text" id="playerBName" class="player-name-input" placeholder="Имя" value="KAI">
            <div class="avatar-grid" id="avatarBGrid"></div>
        </div>
    </div>

    <button class="login-btn" id="loginBtn">🎮 ВОЙТИ И ИГРАТЬ 🎮</button>
    <div class="demo-badge" id="demoBadge"></div>
</div>

<script>
    // ==================== ДОСТУПНЫЕ СМАЙЛИКИ ====================
    const AVATARS = ['⚡', '🔥', '❄️', '🌊', '🦅', '🪨', '🐱', '🍅', '💥', '🎮', '🃏', '🎲', '🥊', '👊', '🛡️', '🗡️', '🏆', '⭐', '💀', '👾'];

    let selectedAvatarA = '⚡';
    let selectedAvatarB = '🌊';
    let telegramData = null;

    // ==================== Telegram WebApp ====================
    let tg = null;
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                telegramData = {
                    id: user.id,
                    username: user.username || '',
                    firstName: user.first_name || '',
                    lastName: user.last_name || '',
                    photoUrl: user.photo_url || null
                };
                
                document.getElementById('telegramName').innerHTML = `${telegramData.firstName} ${telegramData.lastName}`;
                document.getElementById('telegramId').innerHTML = `@${telegramData.username || 'нет username'} • ID: ${telegramData.id}`;
                document.getElementById('telegramAvatar').innerHTML = telegramData.photoUrl ? '🖼️' : '👤';
                document.getElementById('demoBadge').innerHTML = '✅ Вход через Telegram';
            } else {
                document.getElementById('telegramName').innerHTML = 'Демо-режим';
                document.getElementById('telegramId').innerHTML = 'Открыто в браузере';
                document.getElementById('demoBadge').innerHTML = '⚠️ Демо-режим (данные не сохраняются)';
            }
        } else {
            document.getElementById('telegramName').innerHTML = 'Демо-режим';
            document.getElementById('telegramId').innerHTML = 'Открыто в браузере';
            document.getElementById('demoBadge').innerHTML = '⚠️ Демо-режим (данные не сохраняются)';
        }
    } catch(e) {
        document.getElementById('telegramName').innerHTML = 'Ошибка';
        document.getElementById('telegramId').innerHTML = 'Перезагрузите страницу';
    }

    // ==================== РЕНДЕР АВАТАРОВ ====================
    function renderAvatarGrid(containerId, selected, onChange) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        AVATARS.forEach(avatar => {
            const div = document.createElement('div');
            div.className = 'avatar-option';
            if (avatar === selected) div.classList.add('selected');
            div.textContent = avatar;
            div.onclick = () => {
                onChange(avatar);
                renderAvatarGrid(containerId, avatar, onChange);
            };
            container.appendChild(div);
        });
    }

    renderAvatarGrid('avatarAGrid', selectedAvatarA, (newAvatar) => { selectedAvatarA = newAvatar; });
    renderAvatarGrid('avatarBGrid', selectedAvatarB, (newAvatar) => { selectedAvatarB = newAvatar; });

    // ==================== ЗАГРУЗКА СОХРАНЁННЫХ ДАННЫХ ====================
    function loadSavedData() {
        const saved = localStorage.getItem('coupleplay_players');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.playerA) {
                    document.getElementById('playerAName').value = data.playerA.name;
                    selectedAvatarA = data.playerA.avatar;
                    renderAvatarGrid('avatarAGrid', selectedAvatarA, (newAvatar) => { selectedAvatarA = newAvatar; });
                }
                if (data.playerB) {
                    document.getElementById('playerBName').value = data.playerB.name;
                    selectedAvatarB = data.playerB.avatar;
                    renderAvatarGrid('avatarBGrid', selectedAvatarB, (newAvatar) => { selectedAvatarB = newAvatar; });
                }
            } catch(e) {}
        }
    }
    loadSavedData();

    // ==================== ВХОД ====================
    document.getElementById('loginBtn').onclick = () => {
        const playerAName = document.getElementById('playerAName').value.trim();
        const playerBName = document.getElementById('playerBName').value.trim();

        if (!playerAName || !playerBName) {
            alert('❌ Введите имена обоих игроков!');
            return;
        }

        const gameData = {
            telegram: telegramData,
            playerA: {
                name: playerAName,
                avatar: selectedAvatarA
            },
            playerB: {
                name: playerBName,
                avatar: selectedAvatarB
            },
            loginTime: Date.now()
        };

        localStorage.setItem('coupleplay_players', JSON.stringify({
            playerA: gameData.playerA,
            playerB: gameData.playerB
        }));
        
        localStorage.setItem('coupleplay_session', JSON.stringify(gameData));

        // Переход в игры
        window.location.href = 'games.html';
    };
</script>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
